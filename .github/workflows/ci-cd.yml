name: Build and Publish + Update GitOps

on:
  push:
    branches: [ master ]
    paths:
      - 'apps/sample-app/**'
      - '.github/workflows/**'

permissions:
  contents: write
  packages: write

jobs:
  build-and-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image to GHCR
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/sample-nginx:${{ github.sha }}
          docker build -t $IMAGE apps/sample-app
          docker push $IMAGE

      - name: Update deployment manifest with new image
        run: |
          python - <<'PY'
          import yaml
          p='apps/sample-app/deployment.yaml'
          with open(p) as f:
              doc=yaml.safe_load(f)
          img='ghcr.io/{owner}/sample-nginx:{sha}'.format(owner='${{ github.repository_owner }}', sha='${{ github.sha }}')
          doc['spec']['template']['spec']['containers'][0]['image']=img
          with open(p,'w') as f:
              yaml.safe_dump(doc,f)
          PY

      - name: Commit and push updated manifest
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add apps/sample-app/deployment.yaml
          git commit -m "ci: update image to $IMAGE" || echo "no changes"
          git push
